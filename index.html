<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Contador de casos SF</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      margin-top: 50px;
    }

    h1 {
      font-size: 48px;
      font-family: cursive;
    }

    .botoes {
      margin: 30px;
    }

    button {
      padding: 20px 40px;
      font-size: 20px;
      margin: 10px;
      cursor: pointer;
    }

    #resultado {
      margin-top: 30px;
      font-size: 22px;
    }
  </style>
</head>

<body>

  <h1>Contador de casos SF</h1>

  <div class="botoes">
    <button onclick="clicar()">Clique em mim</button>
    <button onclick="zerar()">Zerar o contador</button>
  </div>

  <div id="resultado">
    0 Casos SF
  </div>

  <script>
    let contador = 0

    function clicar() {
      contador++
      atualizar()
    }

    function zerar() {
      contador = 0
      atualizar()
    }

    function atualizar() {
      const agora = new Date()

      const hora = agora.getHours().toString().padStart(2, '0')
      const minuto = agora.getMinutes().toString().padStart(2, '0')

      document.getElementById("resultado").innerHTML =
        contador + " Casos SF - atualizado às " + hora + ":" + minuto
    }
  </script>

</body>
</html>
