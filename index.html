<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Contador de casos SF</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 40px;
    }

    h1 {
      font-size: 48px;
      font-family: cursive;
    }

    .botoes {
      margin-top: 30px;
    }

    button {
      width: 250px;
      height: 120px;
      font-size: 20px;
      margin-right: 20px;
      cursor: pointer;
    }

    #resultado {
      margin-top: 30px;
      font-size: 22px;
    }
  </style>
</head>

<body>

  <h1>Contador de casos SF</h1>

  <div class="botoes">
    <button onclick="clicar()">Clique em mim</button>
    <button onclick="zerar()">Zerar o contador</button>
  </div>

  <div id="resultado">0 Casos SF</div>

  <script>
    let contador = 0
    let inicio = null

    function clicar() {
      if (inicio === null) {
        inicio = new Date()
      }

      contador++
      atualizar()
    }

    function zerar() {
      contador = 0
      inicio = null
      document.getElementById("resultado").innerHTML = "0 Casos SF"
    }

    function formatarHora(data) {
      const h = data.getHours().toString().padStart(2, '0')
      const m = data.getMinutes().toString().padStart(2, '0')
      return h + ":" + m
    }

    function atualizar() {
      const agora = new Date()

      const horaInicio = formatarHora(inicio)
      const horaAtual = formatarHora(agora)

      document.getElementById("resultado").innerHTML =
        contador + " Casos SF " + horaInicio + " - " + horaAtual
    }
  </script>

</body>
</html>
